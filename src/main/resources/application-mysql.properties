# ===================================================================
# MySQL profile
# ===================================================================
# Activate with: SPRING_PROFILES_ACTIVE=mysql
# Supply credentials via environment variables; never hardcode secrets.
# Example env vars (set on the host/container, not committed):
#   DB_URL=jdbc:mysql://<host>:3306/tododb?useSSL=false&serverTimezone=UTC
#   DB_USERNAME=<user>
#   DB_PASSWORD=<password>

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/tododb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Disable the H2 console when running against MySQL
spring.h2.console.enabled=false
