# ===================================================================
# Default configuration
# ===================================================================
# By default the application boots with an embedded H2 in-memory
# database so it can start without any external dependencies.
# To use MySQL, activate the "mysql" profile (SPRING_PROFILES_ACTIVE=mysql)
# and supply the DB_* environment variables (see application-mysql.properties).
server.port=8080
spring.application.name=java-maven-demo

# -------------------------------------------------------------------
# Datasource (embedded H2, in-memory)
# -------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:tododb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 web console available at /h2-console (handy for local debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# -------------------------------------------------------------------
# JPA / Hibernate
# -------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# -------------------------------------------------------------------
# CORS
# -------------------------------------------------------------------
# Comma-separated list of allowed frontend origins.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# -------------------------------------------------------------------
# OpenAPI / Swagger
# -------------------------------------------------------------------
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
