# ===================================================================
# MySQL profile
# ===================================================================
# Activate with: SPRING_PROFILES_ACTIVE=mysql
# Supply credentials via environment variables; never hardcode secrets.
#
# Required environment variables (set on the NevTan app, not committed):
#   DB_URL       - JDBC URL, e.g.
#                  jdbc:mysql://24.199.82.182:3306/mysqld_2bf7cc7f?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
#   DB_USERNAME  - database username
#   DB_PASSWORD  - database password
#
# The DB_URL default below points at the provisioned NevTan MySQL 8.0
# cluster (host/port/database are not secret). Username and password are
# intentionally left without real defaults so they MUST come from the
# environment.

spring.datasource.url=${DB_URL:jdbc:mysql://24.199.82.182:3306/mysqld_2bf7cc7f?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool (HikariCP) tuning
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate for MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# Disable the H2 console when running against MySQL
spring.h2.console.enabled=false
